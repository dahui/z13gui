version: 2

project_name: z13gui

before:
  hooks:
    - go mod tidy

builds:
  - id: z13gui
    binary: z13gui
    env:
      - CGO_ENABLED=1
    ldflags:
      - -s -w -X main.Version={{.Version}}
    goos:
      - linux
    goarch:
      - amd64

archives:
  - id: z13gui
    formats: [tar.gz]
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    files:
      - LICENSE
      - contrib/z13gui.service
      - contrib/z13gui.desktop
      - contrib/99-z13gui-gamepad.rules

checksum:
  name_template: "checksums.txt"

nfpms:
  - id: z13gui-pkg
    package_name: z13gui
    section: utils
    formats:
      - archlinux
      - deb
      - rpm
    homepage: https://github.com/dahui/z13gui
    maintainer: "Jeff Hagadorn <noreply@github.com>"
    description: GTK4 overlay GUI companion for z13ctl
    license: Apache-2.0
    provides:
      - z13gui
    dependencies:
      - gtk4
      - gtk4-layer-shell
    scripts:
      postinstall: contrib/nfpm/postinstall.sh
      preremove: contrib/nfpm/preremove.sh
      postremove: contrib/nfpm/postremove.sh
    contents:
      - src: LICENSE
        dst: /usr/share/licenses/z13gui/LICENSE
      - src: contrib/z13gui.service
        dst: /usr/lib/systemd/user/z13gui.service
      - src: contrib/z13gui.desktop
        dst: /usr/share/applications/z13gui.desktop
      - src: contrib/99-z13gui-gamepad.rules
        dst: /usr/lib/udev/rules.d/99-z13gui-gamepad.rules
    overrides:
      deb:
        dependencies:
          - libgtk-4-1
          - libgtk4-layer-shell0
    archlinux:
      packager: "Jeff Hagadorn <noreply@github.com>"
    rpm:
      group: Applications/System

release:
  draft: false
  prerelease: auto
