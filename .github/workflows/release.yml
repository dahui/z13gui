name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g. v1.0.0)'
        required: true
      release:
        description: 'Run goreleaser (build + GitHub release)'
        type: boolean
        default: true
      aur:
        description: 'Publish to AUR'
        type: boolean
        default: true
      homebrew:
        description: 'Publish to Homebrew'
        type: boolean
        default: true
      docs:
        description: 'Deploy documentation'
        type: boolean
        default: true

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    container: archlinux:latest
    if: github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.release)
    steps:
      - name: Install dependencies
        run: pacman -Syu --noconfirm git base-devel go gtk4 gtk4-layer-shell gobject-introspection
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.inputs.tag || github.ref }}
      - name: Fix git ownership
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE"
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - uses: goreleaser/goreleaser-action@v6
        with:
          version: latest
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GORELEASER_CURRENT_TAG: ${{ github.event.inputs.tag || github.ref_name }}

  aur:
    needs: release
    runs-on: ubuntu-latest
    if: >-
      always() &&
      !contains(github.event.inputs.tag || github.ref_name, '-') &&
      (
        (github.event_name == 'push' && needs.release.result == 'success') ||
        (github.event_name == 'workflow_dispatch' && inputs.aur && (needs.release.result == 'success' || needs.release.result == 'skipped'))
      )
    steps:
      - uses: actions/checkout@v4

      - name: Get version, sha256, and pkgrel
        id: meta
        run: |
          TAG="${{ github.event.inputs.tag || github.ref_name }}"
          VERSION="${TAG#v}"
          URL="https://github.com/dahui/z13gui/releases/download/${TAG}/z13gui_${VERSION}_linux_amd64.tar.gz"
          SHA256=$(curl -fsSL "$URL" | sha256sum | cut -d' ' -f1)

          # Compute pkgrel: increment if same version already on AUR, else 1
          PKGREL=1
          AUR_VER=$(curl -fsSL "https://aur.archlinux.org/rpc/v5/info?arg[]=z13gui-bin" \
            | jq -r '.results[0].Version // empty')
          if [ -n "$AUR_VER" ]; then
            AUR_PKGVER="${AUR_VER%-*}"
            AUR_PKGREL="${AUR_VER##*-}"
            if [ "$AUR_PKGVER" = "$VERSION" ] && [ -n "$AUR_PKGREL" ]; then
              PKGREL=$((AUR_PKGREL + 1))
            fi
          fi

          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "sha256=$SHA256"   >> "$GITHUB_OUTPUT"
          echo "pkgrel=$PKGREL"   >> "$GITHUB_OUTPUT"

      - name: Patch PKGBUILD
        run: |
          sed -i "s/PKGVER_PLACEHOLDER/${{ steps.meta.outputs.version }}/" contrib/aur/PKGBUILD
          sed -i "s/PKGREL_PLACEHOLDER/${{ steps.meta.outputs.pkgrel }}/"  contrib/aur/PKGBUILD
          sed -i "s/SHA256_PLACEHOLDER/${{ steps.meta.outputs.sha256 }}/"  contrib/aur/PKGBUILD

      - name: Generate .SRCINFO
        run: |
          docker run --rm -v "$PWD/contrib/aur:/pkg" archlinux:latest \
            bash -c "pacman -Sy --noconfirm pacman-contrib && useradd -m builder && chown -R builder /pkg && su builder -c 'cd /pkg && makepkg --printsrcinfo > .SRCINFO'"

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.AUR_KEY }}" > ~/.ssh/aur
          chmod 600 ~/.ssh/aur
          for i in $(seq 1 100); do
            ssh-keyscan -t ed25519,ecdsa,rsa aur.archlinux.org >> ~/.ssh/known_hosts 2>/dev/null && break
            DELAY=$(( (10 + (i - 1) * 5) < 30 ? (10 + (i - 1) * 5) : 30 ))
            echo "Keyscan attempt $i failed, retrying in ${DELAY}s..."
            sleep "$DELAY"
          done
          cat >> ~/.ssh/config <<'EOF'
          Host aur.archlinux.org
            IdentityFile ~/.ssh/aur
            User aur
          EOF

      - name: Push to AUR
        run: |
          for i in $(seq 1 100); do
            git clone ssh://aur@aur.archlinux.org/z13gui-bin.git /tmp/aur-repo && break
            DELAY=$(( (10 + (i - 1) * 5) < 30 ? (10 + (i - 1) * 5) : 30 ))
            echo "Clone attempt $i failed, retrying in ${DELAY}s..."
            rm -rf /tmp/aur-repo
            sleep "$DELAY"
          done
          cp contrib/aur/PKGBUILD contrib/aur/.SRCINFO /tmp/aur-repo/
          [ -f contrib/aur/z13gui-bin.install ] && cp contrib/aur/z13gui-bin.install /tmp/aur-repo/
          cd /tmp/aur-repo
          git config user.name "z13gui Release Bot"
          git config user.email "noreply@github.com"
          git add -A
          git diff --cached --quiet && echo "No changes to push" && exit 0
          git commit -m "Update to ${{ github.event.inputs.tag || github.ref_name }}"
          for i in $(seq 1 100); do
            git push && exit 0
            DELAY=$(( (10 + (i - 1) * 5) < 30 ? (10 + (i - 1) * 5) : 30 ))
            echo "Push attempt $i failed, retrying in ${DELAY}s..."
            sleep "$DELAY"
          done
          echo "All push attempts failed"
          exit 1

  homebrew:
    needs: release
    runs-on: ubuntu-latest
    if: >-
      always() &&
      !contains(github.event.inputs.tag || github.ref_name, '-') &&
      (
        (github.event_name == 'push' && needs.release.result == 'success') ||
        (github.event_name == 'workflow_dispatch' && inputs.homebrew && (needs.release.result == 'success' || needs.release.result == 'skipped'))
      )
    steps:
      - uses: actions/checkout@v4

      - name: Get version and sha256
        id: meta
        run: |
          TAG="${{ github.event.inputs.tag || github.ref_name }}"
          VERSION="${TAG#v}"
          URL="https://github.com/dahui/z13gui/releases/download/${TAG}/z13gui_${VERSION}_linux_amd64.tar.gz"
          SHA256=$(curl -fsSL "$URL" | sha256sum | cut -d' ' -f1)
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "sha256=$SHA256"   >> "$GITHUB_OUTPUT"

      - name: Push formula to tap
        run: |
          git clone "https://x-access-token:${{ secrets.HOMEBREW_TAP_GITHUB_TOKEN }}@github.com/dahui/homebrew-z13ctl.git" tap
          mkdir -p tap/Formula
          cp contrib/homebrew/z13gui.rb tap/Formula/z13gui.rb
          sed -i "s/VERSION_PLACEHOLDER/${{ steps.meta.outputs.version }}/g" tap/Formula/z13gui.rb
          sed -i "s/SHA256_PLACEHOLDER/${{ steps.meta.outputs.sha256 }}/"    tap/Formula/z13gui.rb
          cd tap
          git config user.name  "z13gui Release Bot"
          git config user.email "noreply@github.com"
          git add Formula/z13gui.rb
          git commit -m "Update z13gui to ${{ github.event.inputs.tag || github.ref_name }}"
          git push

  docs:
    needs: release
    runs-on: ubuntu-latest
    if: >-
      always() &&
      (
        (github.event_name == 'push' && needs.release.result == 'success') ||
        (github.event_name == 'workflow_dispatch' && inputs.docs && (needs.release.result == 'success' || needs.release.result == 'skipped'))
      )
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: 3.x

      - uses: actions/cache@v4
        with:
          key: mkdocs-material-${{ hashFiles('requirements.txt') }}
          path: .cache
          restore-keys: mkdocs-material-

      - name: Install MkDocs Material
        run: pip install -r requirements.txt

      - name: Deploy to GitHub Pages
        run: mkdocs gh-deploy --force
