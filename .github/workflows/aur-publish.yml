name: Publish to AUR

on:
  release:
    types: [published]

jobs:
  aur:
    runs-on: ubuntu-latest
    if: "!github.event.release.prerelease"
    steps:
      - uses: actions/checkout@v4

      - name: Get version and sha256
        id: meta
        run: |
          TAG="${{ github.event.release.tag_name }}"
          VERSION="${TAG#v}"
          URL="https://github.com/dahui/z13gui/releases/download/${TAG}/z13gui_${VERSION}_linux_amd64.tar.gz"
          SHA256=$(curl -fsSL "$URL" | sha256sum | cut -d' ' -f1)
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "sha256=$SHA256"   >> "$GITHUB_OUTPUT"

      - name: Patch PKGBUILD
        run: |
          sed -i "s/PKGVER_PLACEHOLDER/${{ steps.meta.outputs.version }}/" contrib/aur/PKGBUILD
          sed -i "s/SHA256_PLACEHOLDER/${{ steps.meta.outputs.sha256 }}/"  contrib/aur/PKGBUILD

      - uses: KSXGitHub/github-actions-deploy-aur@v4
        with:
          pkgname: z13gui-bin
          pkgbuild: contrib/aur/PKGBUILD
          assets: contrib/aur/z13gui-bin.install
          commit_username: "z13gui Release Bot"
          commit_email: "noreply@github.com"
          ssh_private_key: ${{ secrets.AUR_KEY }}
          commit_message: "Update to ${{ github.event.release.tag_name }}"
          force_push: true
