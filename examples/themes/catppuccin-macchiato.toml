# Catppuccin Macchiato — z13gui theme
# Copy this file to ~/.config/z13gui/theme.toml to use it.
# All values are CSS hex color strings: #rrggbb
# Changes take effect the next time z13gui starts.
#
# This theme supports accent color variants. The [accents] section below
# defines all 14 official Catppuccin accent colors. The accent dots appear
# in the theme picker when this file is used as a custom theme.

# Accent color — active buttons, slider fill, checked states
accent = "#c6a0f6"

# Drawer background
background = "#24273a"

# Surface color — button and row backgrounds
surface = "#363a4f"

# Alternate surface — hover state background
surface_alt = "#494d64"

# Primary text color
text = "#cad3f5"

# Dim text color — section labels, secondary descriptions
text_dim = "#a5adcb"

# Border color — window outline and separators
border = "#5b6078"

[accents]
rosewater = "#f4dbd6"
flamingo = "#f0c6c6"
pink = "#f5bde6"
mauve = "#c6a0f6"
red = "#ed8796"
maroon = "#ee99a0"
peach = "#f5a97f"
yellow = "#eed49f"
green = "#a6da95"
teal = "#8bd5ca"
sky = "#91d7e3"
sapphire = "#7dc4e4"
blue = "#8aadf4"
lavender = "#b7bdf8"
